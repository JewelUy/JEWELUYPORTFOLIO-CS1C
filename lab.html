<!DOCTYPE html>
<html>
<head>
  <title>Laboratory activities</title>

  <style>
    body {
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #2a2a2a 100%);
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
    }

    h1, h2 {
      color: #ffffff;
    }

    p, label {
      color: #d3d3d3;
    }

    /* NAVBAR */
    .navbar ul {
      list-style-type: none;
      padding: 0;
      margin: 0 0 20px 0;
      background-color: rgba(255,255,255,0.05);
      border-radius: 8px;
      overflow: hidden;
    }

    .navbar li {
      display: inline;
    }

    .navbar a {
      display: inline-block;
      padding: 12px 20px;
      color: #f8f8f8;
      text-decoration: none;
    }

    .navbar a:hover {
      background-color: rgba(255,255,255,0.1);
    }

    /* FORM BOX */
    .box {
      background-color: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 10px;
      width: 400px;
    }

    input, button {
      margin-top: 5px;
      margin-bottom: 15px;
      padding: 5px;
    }

    button {
      background-color: #ffffff;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background-color: #f3f5f6;
    }

    .quiz-container {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    /* ✅ FIXED IMAGE STYLE */
    .lab-img {
      width: 100%;
      height: auto;
      border-radius: 8px;
    }

  </style>
</head>

<body>

<h1>Laboratory activities</h1>

<!-- NAVIGATION -->
<nav class="navbar">
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="quiz.html">Quiz</a></li>
    <li><a href="lab.html">Lab</a></li>
    <li><a href="midterm exam.html">Major exams</a></li>
  </ul>
</nav>

<!-- FORM -->
  <div class="box">
  <form>
    
    <label>Title:</label><br>
    <input type="text" name="title"><br><br>

    <label>Upload File:</label><br>
    <input type="file" name="file"><br><br>

    <label>Website link:</label><br>
    <input type="url" name="link" placeholder="https://example.com"><br><br>

    <button type="submit">Submit</button>

  </form>
</div>
</div>

<!-- IMAGE CONTAINER -->
<div class="quiz-container">
  <div class="box">
    <h1>Lab Act 1</h1>
    <img src="carousel.jpg" class="lab-img">

    <h3> <a href="https://jeweluy.github.io/carouselUy/#slide1" target="_blank">Carousel website</a></h3>
  </div>
</div>

</body>
</html>
