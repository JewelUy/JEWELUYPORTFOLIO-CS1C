<!DOCTYPE html>

<head>

<link rel="icon" href="batman.png">

  <style>
    body {
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #2a2a2a 100%);
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
    }

    h1, h2 {
      color: #ffffff;
    }

    p, label {
      color: #d3d3d3;
    }

    /* NAVBAR */
    .navbar ul {
      list-style-type: none;
      padding: 0;
      margin: 0 0 20px 0;
      background-color: rgba(255,255,255,0.05);
      border-radius: 8px;
      overflow: hidden;
    }

    .navbar li {
      display: inline;
    }

    .navbar a {
      display: inline-block;
      padding: 12px 20px;
      color: #f8f8f8;
      text-decoration: none;
    }

    .navbar a:hover {
      background-color: rgba(255,255,255,0.1);
    }

    /* FORM BOX */
    .box {
      background-color: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 10px;
      width: 300px;
    }

    input, button {
      margin-top: 5px;
      margin-bottom: 15px;
      padding: 5px;
    }

    button {
      background-color: #ffffff;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background-color: #f3f5f6;
    }
  </style>
</head>
