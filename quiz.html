<!DOCTYPE html>
<html>
<head>
  <title>Quiz</title>
  <link rel="icon" href="batman.png">

  <style>
    body {
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #2a2a2a 100%);
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
    }

    h1, h2 {
      color: #ffffff;
    }

    p, label {
      color: #d3d3d3;
    }

    /* NAVBAR */
    .navbar ul {
      list-style-type: none;
      padding: 0;
      margin: 0 0 20px 0;
      background-color: rgba(255,255,255,0.05);
      border-radius: 8px;
      overflow: hidden;
    }

    .navbar li {
      display: inline;
    }

    .navbar a {
      display: inline-block;
      padding: 12px 20px;
      color: #f8f8f8;
      text-decoration: none;
    }

    .navbar a:hover {
      background-color: rgba(255,255,255,0.1);
    }

    /* FLEX CONTAINER */
    .quiz-container {
      display: flex;
      gap: 20px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    /* CARD */
    .box {
      background-color: rgba(255,255,255,0.1);
      padding: 15px;
      border-radius: 10px;
      width: 380px;
      height: 500px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .box img {
      width: 100%;
      height: 360px;
      object-fit: contain;
      background-color: rgba(0,0,0,0.2);
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h1>Quizzes Page</h1>
