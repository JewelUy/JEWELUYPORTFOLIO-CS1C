<!DOCTYPE html>
<html>
<head>
  <title>Quiz Upload</title>

  <style>
    body {
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #2a2a2a 100%);
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
    }

    h1, h2 {
      color: #ffffff;
    }

    p, label {
      color: #d3d3d3;
    }

    /* NAVBAR */
    .navbar ul {
      list-style-type: none;
      padding: 0;
      margin: 0 0 20px 0;
      background-color: rgba(255,255,255,0.05);
      border-radius: 8px;
      overflow: hidden;
    }

    .navbar li {
      display: inline;
    }

    .navbar a {
      display: inline-block;
      padding: 12px 20px;
      color: #f8f8f8;
      text-decoration: none;
    }

    .navbar a:hover {
      background-color: rgba(255,255,255,0.1);
    }

    /* FORM BOX */
    .box {
      background-color: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 10px;
      width: 400px;
    }

    input, button {
      margin-top: 5px;
      margin-bottom: 15px;
      padding: 5px;
    }

    button {
      background-color: #ffffff;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background-color: #f3f5f6;
    }


    .quiz-container {
      display: flex;
      gap: 20px;
      margin-top: 20px;
      flex-wrap: wrap;       
  justify-content: flex-start;
    }

  </style>
</head>

<body>

<h1>Quiz Upload Page</h1>

<!-- NAVIGATION -->
<nav class="navbar">
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="quiz.html">Quiz</a></li>
    <li><a href="lab.html">Lab</a></li>
    <li><a href="midterm exam.html">Midterm</a></li>
  </ul>
</nav>

<!-- FORM -->
<div class="box">
  <form>
    <label>Title:</label><br>
    <input type="text"><br>

    <label>Upload File:</label><br>
    <input type="file"><br>

    <button type="submit">Submit</button>
  </form>
</div>

<!-- ✅ QUIZ DISPLAY -->
<div class="quiz-container">

  <div class="box">
    <h1> Quiz 1 </h1>
    <img src="quiz1.jpg" width="400" height="500">
  </div>

  <div class="box">
    <h1> Quiz 2 </h1>
    <img src="quiz2.jpg" width="400" height="500">
  </div>

</div>

  <div class="box">
    <h1> Quiz 3 </h1>
    <img src="quiz3.jpg" width="400" height="500">
  </div>


</body>
</html>
